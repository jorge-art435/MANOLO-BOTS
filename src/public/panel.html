<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manolo Gastrobar - Panel de Pedidos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }

    header {
      background: #c8a96e;
      color: white;
      padding: 20px;
      text-align: center;
    }
    header h1 { font-size: 24px; }
    header p { font-size: 14px; opacity: 0.9; }

    .contenedor { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

    .stats {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      border-radius: 10px;
      padding: 15px 20px;
      flex: 1;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .stat-card h2 { font-size: 32px; color: #c8a96e; }
    .stat-card p { font-size: 13px; color: #666; }

    .pedido-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-left: 5px solid #c8a96e;
    }
    .pedido-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .pedido-header h3 { font-size: 18px; color: #333; }
    .pedido-header span { font-size: 13px; color: #999; }

    .pedido-info { margin-bottom: 15px; }
    .pedido-info p { font-size: 14px; color: #555; margin-bottom: 5px; }
    .pedido-info strong { color: #333; }

    .productos { margin-bottom: 15px; }
    .productos h4 { font-size: 14px; color: #333; margin-bottom: 8px; }
    .producto-item {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #555;
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .pedido-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total { font-size: 18px; font-weight: bold; color: #c8a96e; }

    select {
      padding: 8px 12px;
      border-radius: 6px;
      border: 2px solid #c8a96e;
      font-size: 14px;
      cursor: pointer;
      background: white;
      color: #333;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-recibido { background: #fff3cd; color: #856404; }
    .badge-preparacion { background: #cce5ff; color: #004085; }
    .badge-camino { background: #d4edda; color: #155724; }
    .badge-entregado { background: #d1ecf1; color: #0c5460; }

    .sin-pedidos {
      text-align: center;
      padding: 60px;
      color: #999;
      font-size: 16px;
    }

    button#recargar {
      background: #c8a96e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>🍽️ Manolo Gastrobar</h1>
  <p>Panel de pedidos del día</p>
</header>

<div class="contenedor">
  <div class="stats">
    <div class="stat-card">
      <h2 id="total-pedidos">0</h2>
      <p>Pedidos hoy</p>
    </div>
    <div class="stat-card">
      <h2 id="en-proceso">0</h2>
      <p>En proceso</p>
    </div>
    <div class="stat-card">
      <h2 id="entregados">0</h2>
      <p>Entregados</p>
    </div>
  </div>

  <button id="recargar" onclick="cargarPedidos()">🔄 Actualizar pedidos</button>

  <div id="lista-pedidos"></div>
</div>

<script>
  async function cargarPedidos() {
    const res = await fetch('/panel/pedidos');
    const pedidos = await res.json();

    document.getElementById('total-pedidos').textContent = pedidos.length;
    document.getElementById('en-proceso').textContent = pedidos.filter(p => p.estado !== 'entregado').length;
    document.getElementById('entregados').textContent = pedidos.filter(p => p.estado === 'entregado').length;

    const lista = document.getElementById('lista-pedidos');

    if (pedidos.length === 0) {
      lista.innerHTML = '<div class="sin-pedidos">😴 No hay pedidos hoy todavía</div>';
      return;
    }

    lista.innerHTML = pedidos.map(pedido => {
      const fecha = new Date(pedido.fecha).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
      const badgeClass = {
        'recibido': 'badge-recibido',
        'en preparación': 'badge-preparacion',
        'en camino': 'badge-camino',
        'entregado': 'badge-entregado'
      }[pedido.estado] || 'badge-recibido';

      return `
        <div class="pedido-card">
          <div class="pedido-header">
            <h3>👤 ${pedido.clientes?.nombre || 'Cliente'}</h3>
            <span>⏰ ${fecha}</span>
          </div>
          <div class="pedido-info">
            <p>📱 <strong>WhatsApp:</strong> +${pedido.clientes?.whatsapp || ''}</p>
            <p>📍 <strong>Dirección:</strong> ${pedido.direccion}</p>
            <p>🏷️ <strong>Estado:</strong> <span class="badge ${badgeClass}">${pedido.estado}</span></p>
          </div>
          <div class="productos">
            <h4>🛒 Productos:</h4>
            ${pedido.items_pedido?.map(item => `
              <div class="producto-item">
                <span>${item.nombre_producto}</span>
                <span>x${item.cantidad}</span>
              </div>
            `).join('') || '<p>Sin productos</p>'}
          </div>
          <div class="pedido-footer">
            <span class="total">💰 Total: $${pedido.total?.toLocaleString('es-CO') || 'Por confirmar'}</span>
            <select onchange="cambiarEstado('${pedido.id}', this.value)">
              <option ${pedido.estado === 'recibido' ? 'selected' : ''}>recibido</option>
              <option ${pedido.estado === 'en preparación' ? 'selected' : ''}>en preparación</option>
              <option ${pedido.estado === 'en camino' ? 'selected' : ''}>en camino</option>
              <option ${pedido.estado === 'entregado' ? 'selected' : ''}>entregado</option>
            </select>
          </div>
        </div>
      `;
    }).join('');
  }

  async function cambiarEstado(id, estado) {
    await fetch(`/panel/pedidos/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ estado })
    });
    cargarPedidos();
  }

  // Cargar al inicio y cada 30 segundos
  cargarPedidos();
  setInterval(cargarPedidos, 30000);
</script>

</body>
</html>
