<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manolo Gastrobar - Panel de Pedidos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0a0a0a; color: #f0f0f0; }

    header {
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
      border-bottom: 2px solid #c8a84b;
      padding: 20px;
      text-align: center;
    }
    header h1 { font-size: 28px; color: #c8a84b; letter-spacing: 3px; text-transform: uppercase; }
    header p { font-size: 13px; color: #888; margin-top: 4px; }

    .contenedor { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

    .stats {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-top: 3px solid #c8a84b;
      border-radius: 10px;
      padding: 15px 20px;
      flex: 1;
      text-align: center;
    }
    .stat-card h2 { font-size: 36px; color: #c8a84b; }
    .stat-card p { font-size: 13px; color: #888; margin-top: 4px; }

    .pedido-card {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      border-left: 5px solid #c8a84b;
      border: 1px solid #2a2a2a;
      border-left: 5px solid #c8a84b;
    }
    .pedido-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .pedido-header h3 { font-size: 18px; color: #c8a84b; }
    .pedido-header span { font-size: 13px; color: #666; }

    .pedido-info { margin-bottom: 15px; }
    .pedido-info p { font-size: 14px; color: #aaa; margin-bottom: 6px; }
    .pedido-info strong { color: #ddd; }

    .productos { margin-bottom: 15px; }
    .productos h4 { font-size: 14px; color: #c8a84b; margin-bottom: 8px; }
    .producto-item {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #aaa;
      padding: 5px 0;
      border-bottom: 1px solid #2a2a2a;
    }

    .pedido-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total { font-size: 18px; font-weight: bold; color: #c8a84b; }

    select {
      padding: 8px 12px;
      border-radius: 6px;
      border: 2px solid #c8a84b;
      font-size: 14px;
      cursor: pointer;
      background: #0a0a0a;
      color: #f0f0f0;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-recibido { background: #2a2000; color: #c8a84b; }
    .badge-preparacion { background: #1a0000; color: #e05555; }
    .badge-camino { background: #1a1000; color: #e0a030; }
    .badge-entregado { background: #0a1a0a; color: #50c050; }

    .sin-pedidos {
      text-align: center;
      padding: 60px;
      color: #555;
      font-size: 16px;
    }

    button#recargar {
      background: #c8a84b;
      color: #0a0a0a;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    button#recargar:hover { background: #e0c060; }
  </style>
