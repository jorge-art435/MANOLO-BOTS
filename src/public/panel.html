<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manolo Gastrobar - Panel de Pedidos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111111; color: #f0f0f0; }

   header {
      background: #1a1a1a;
      border-bottom: 3px solid #c8a84b;
      border-top: 3px solid #c0392b;
      padding: 20px;
      text-align: center;
    }
    header h1 { font-size: 28px; color: #c8a84b; letter-spacing: 3px; }
    header p { font-size: 13px; color: #999; margin-top: 4px; }

    .contenedor { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

    .stats { display: flex; gap: 15px; margin-bottom: 30px; }

    .stat-card {
      background: #222222;
      border-top: 3px solid #c8a84b;
      border-radius: 10px;
      padding: 15px 20px;
      flex: 1;
      text-align: center;
    }
    .stat-card h2 { font-size: 36px; color: #c8a84b; }
    .stat-card p { font-size: 13px; color: #aaa; margin-top: 4px; }

    .pedido-card {
      background: #222222;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      border-left: 5px solid #c8a84b;
    }
    .pedido-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .pedido-header h3 { font-size: 18px; color: #c8a84b; }
    .pedido-header span { font-size: 13px; color: #777; }

    .pedido-info { margin-bottom: 15px; }
    .pedido-info p { font-size: 14px; color: #bbb; margin-bottom: 6px; }
    .pedido-info strong { color: #eee; }

    .productos { margin-bottom: 15px; }
    .productos h4 { font-size: 14px; color: #c8a84b; margin-bottom: 8px; }
    .producto-item {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #bbb;
      padding: 5px 0;
      border-bottom: 1px solid #333;
    }

    .pedido-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total { font-size: 18px; font-weight: bold; color: #c8a84b; }

    select {
      padding: 8px 12px;
      border-radius: 6px;
      border: 2px solid #c8a84b;
      font-size: 14px;
      cursor: pointer;
      background: #333;
      color: #f0f0f0;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-recibido { background: #3a2800; color: #c8a84b; }
    .badge-preparacion { background: #3a0000; color: #ff6666; }
    .badge-camino { background: #3a2000; color: #ffaa33; }
    .badge-entregado { background: #003a00; color: #66cc66; }

    .sin-pedidos {
  text-align: center;
  padding: 60px;
  color: #c8a84b;
  font-size: 16px;
  border: 1px dashed #333;
  border-radius: 10px;
  margin-top: 20px;
}

.header-content {
  display: flex;
  justify-content: center;
  align-items: center;
}
header {
  border-top: 3px solid #c0392b;
}
.pedido-card {
  border-left: 5px solid #c0392b !important;
}

button#recargar {
  background: #c8a84b;
  color: #111;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 20px;
}
button#recargar:hover { background: #e0c060; }
.header-content img {
  height: 70px;
  width: 70px;
  border-radius: 50%;
  border: 2px solid #c8a84b;
  position: absolute;
  right: 30px;
}
header {
  position: relative;
}
</style>
</head>

<div class="contenedor">
  <div class="stats">
    <div class="stat-card">
      <h2 id="total-pedidos">0</h2>
      <p>Pedidos hoy</p>
    </div>
    <div class="stat-card">
      <h2 id="en-proceso">0</h2>
      <p>En proceso</p>
    </div>
    <div class="stat-card">
      <h2 id="entregados">0</h2>
      <p>Entregados</p>
    </div>
  </div>

  <button id="recargar" onclick="cargarPedidos()">🔄 Actualizar pedidos</button>

  <div id="lista-pedidos"></div>
</div>

<script>
  async function cargarPedidos() {
    const res = await fetch('/panel/pedidos');
    const pedidos = await res.json();

    document.getElementById('total-pedidos').textContent = pedidos.length;
    document.getElementById('en-proceso').textContent = pedidos.filter(p => p.estado !== 'entregado').length;
    document.getElementById('entregados').textContent = pedidos.filter(p => p.estado === 'entregado').length;

    const lista = document.getElementById('lista-pedidos');

    if (pedidos.length === 0) {
      lista.innerHTML = '<div class="sin-pedidos">🍽️ Por el momento no hay pedidos. ¡En breve llegará el primero!</div>';
      return;
    }

    lista.innerHTML = pedidos.map(pedido => {
      const fecha = new Date(pedido.fecha).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
      const badgeClass = {
        'recibido': 'badge-recibido',
        'en preparación': 'badge-preparacion',
        'en camino': 'badge-camino',
        'entregado': 'badge-entregado'
      }[pedido.estado] || 'badge-recibido';

      return `
        <div class="pedido-card">
          <div class="pedido-header">
            <h3>👤 ${pedido.clientes?.nombre || 'Cliente'}</h3>
            <span>⏰ ${fecha}</span>
          </div>
          <div class="pedido-info">
            <p>📱 <strong>WhatsApp:</strong> +${pedido.clientes?.whatsapp || ''}</p>
            <p>📍 <strong>Dirección:</strong> ${pedido.direccion}</p>
            <p>🏷️ <strong>Estado:</strong> <span class="badge ${badgeClass}">${pedido.estado}</span></p>
          </div>
          <div class="productos">
            <h4>🛒 Productos:</h4>
            ${pedido.items_pedido?.map(item => `
              <div class="producto-item">
                <span>${item.nombre_producto}</span>
                <span>x${item.cantidad}</span>
              </div>
            `).join('') || '<p>Sin productos</p>'}
          </div>
          <div class="pedido-footer">
            <span class="total">💰 Total: $${pedido.total?.toLocaleString('es-CO') || 'Por confirmar'}</span>
            <select onchange="cambiarEstado('${pedido.id}', this.value)">
              <option ${pedido.estado === 'recibido' ? 'selected' : ''}>recibido</option>
              <option ${pedido.estado === 'en preparación' ? 'selected' : ''}>en preparación</option>
              <option ${pedido.estado === 'en camino' ? 'selected' : ''}>en camino</option>
              <option ${pedido.estado === 'entregado' ? 'selected' : ''}>entregado</option>
            </select>
          </div>
        </div>
      `;
    }).join('');
  }

  async function cambiarEstado(id, estado) {
    await fetch(`/panel/pedidos/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ estado })
    });
    cargarPedidos();
  }

  cargarPedidos();
  setInterval(cargarPedidos, 30000);
</script>

</body>
